<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Clinic – Select Role</title>

    <!-- Favicon -->
    <link rel="icon" href="./assets/images/logo/logo.png" type="image/png">

    <!-- CSS -->
    <link rel="stylesheet" href="./assets/css/index.css">
    <link rel="stylesheet" href="./assets/css/style.css">

    <!-- Utility Scripts -->
    <script src="./js/util.js" defer></script>
    <script src="./js/render.js" defer></script>

    <!-- Components -->
    <script src="./js/components/header.js" defer></script>
    <script src="./js/components/footer.js" defer></script>
</head>

<body>

<div class="wrapper">

    <!-- Header Placeholder -->
    <div id="header"></div>

    <!-- Main Content: title + buttons mittig -->
    <main class="main-content">
        <section class="role-selection">
            <h2>Select Your <span style="color: #A62B1F;">Role</span></h2>
            <div class="role-buttons">
                <button id="adminBtn" onclick="selectRole('admin')">Admin</button>
                <button id="patientBtn" onclick="selectRole('patient')">Patient</button>
                <button id="doctorBtn" onclick="selectRole('doctor')">Doctor</button>
            </div>
        </section>
    </main>

    <!-- Footer Placeholder -->
    <div id="footer"></div>

</div>

<!-- Hidden Modal -->
<div id="modal" class="modal">
    <span id="closeModal" class="close">&times;</span>
    <div id="modal-body"></div>
</div>

<!-- Service Script -->
<script type="module" src="./js/services/index.js" defer></script>

</body>
</html>
